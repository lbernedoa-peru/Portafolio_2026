<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Por qué tan tóxicas? 🐒</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0033 0%, #000000 100%);
      height: 100vh;
      margin: 0;
      position: relative;
      color: white;
    }

    .stars { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: transparent; overflow: hidden; }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 1; } }

    .flower {
      position: absolute;
      filter: drop-shadow(0 0 30px #ffeb3b);
      animation: sway 7s infinite ease-in-out;
    }

    .heart-float {
      position: absolute;
      font-size: 32px;
      animation: floatHeart 11s linear infinite;
      filter: drop-shadow(0 0 15px #ff3366);
    }

    @keyframes floatHeart {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) rotate(420deg); opacity: 0; }
    }

    .sticker {
      position: absolute;
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 22px;
      box-shadow: 0 0 30px rgba(255, 100, 150, 0.7);
      animation: floatSticker 10s linear infinite;
      cursor: grab;
      z-index: 10;
    }

    .main-sticker {
      position: absolute;
      top: 28%;
      left: 50%;
      transform: translateX(-50%);
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 30px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
      z-index: 20;
      animation: gentleFloat 4s ease-in-out infinite;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateX(-50%) translateY(-10px); }
      50% { transform: translateX(-50%) translateY(10px); }
    }

    @keyframes floatSticker {
      0% { transform: translateY(110vh) rotate(0deg) scale(0.7); }
      100% { transform: translateY(-150px) rotate(720deg) scale(1.05); }
    }

    .title {
      font-family: 'Dancing Script', cursive;
      text-shadow: 0 0 25px #ff3366;
    }
  </style>
</head>
<body>

  <!-- Estrellas -->
  <div class="stars" id="stars"></div>

  <!-- Título principal -->
  <div class="absolute top-8 left-1/2 -translate-x-1/2 text-center z-30">
    <h1 class="title text-5xl md:text-6xl font-bold text-pink-300">
      ¿Por qué tan tóxicas? 😔
    </h1>
    <p class="text-2xl mt-3 text-yellow-200 font-medium">
      Para las guapas  del Clínica Divino Niño 💛
    </p>
  </div>

  <!-- Sticker principal grande -->
  <img src="https://stickerly.pstatic.net/sticker_pack/0Gd9FoSDMiRX31GhijA55w/QO3UZY/16/85f1b5f6-0df7-455d-a87a-304ae7e0fa71.png" 
       class="main-sticker" alt="Monito tóxico">

  <!-- Flores -->
  <div class="absolute bottom-44 left-1/2 -translate-x-1/2 flex gap-8 z-10">
    <img src="https://i.ibb.co.com/0jKzL5Y/yellow-flower.png" class="flower w-24" style="animation-delay: 0s;">
    <img src="https://i.ibb.co.com/0jKzL5Y/yellow-flower.png" class="flower w-28" style="animation-delay: 2s;">
    <img src="https://i.ibb.co.com/0jKzL5Y/yellow-flower.png" class="flower w-24" style="animation-delay: 4s;">
  </div>

  <!-- Hierba -->
  <div class="absolute bottom-0 left-0 right-0 h-52 bg-gradient-to-t from-[#0a2a1a] to-transparent"></div>

  <!-- Contenedor de stickers flotantes -->
  <div id="floating-container" class="absolute inset-0 pointer-events-none"></div>

  <!-- Panel inferior -->
  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-black/70 backdrop-blur-lg rounded-3xl px-8 py-5 flex flex-wrap justify-center gap-4 z-30 border border-pink-300/30">
    <label class="cursor-pointer bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-400 hover:to-purple-400 text-white font-bold px-7 py-3.5 rounded-2xl flex items-center gap-2 shadow-lg transition-all">
      📤 Subir más stickers
      <input type="file" id="sticker-upload" accept="image/*" class="hidden" multiple>
    </label>
    
    <button onclick="addRandomMonito()" 
            class="bg-white/10 hover:bg-white/20 px-7 py-3.5 rounded-2xl transition-all font-medium">
      🐒 Otro monito
    </button>
  </div>

  <script>
    // Estrellas
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 140; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 70}%`;
        star.style.animationDelay = `-${Math.random() * 4}s`;
        container.appendChild(star);
      }
    }

    // Corazones flotantes
    function createHearts() {
      const container = document.getElementById('floating-container');
      for (let i = 0; i < 7; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-float';
        heart.textContent = '💔';
        heart.style.left = `${12 + Math.random() * 75}%`;
        heart.style.animationDuration = `${10 + Math.random() * 8}s`;
        heart.style.animationDelay = `-${i * 2}s`;
        container.appendChild(heart);
      }
    }

    // Subir stickers
    document.getElementById('sticker-upload').addEventListener('change', function(e) {
      for (let file of e.target.files) {
        const reader = new FileReader();
        reader.onload = ev => addSticker(ev.target.result);
        reader.readAsDataURL(file);
      }
    });

    function addSticker(src) {
      const container = document.getElementById('floating-container');
      const sticker = document.createElement('img');
      sticker.className = 'sticker';
      sticker.src = src;
      sticker.style.left = `${Math.random() * 80 + 10}%`;
      sticker.style.animationDuration = `${8 + Math.random() * 9}s`;
      makeDraggable(sticker);
      container.appendChild(sticker);
      setTimeout(() => sticker.remove(), 30000);
    }

    function addRandomMonito() {
      addSticker("https://stickerly.pstatic.net/sticker_pack/0Gd9FoSDMiRX31GhijA55w/QO3UZY/16/85f1b5f6-0df7-455d-a87a-304ae7e0fa71.png");
    }

    function makeDraggable(el) {
      let isDragging = false, x, y;
      el.addEventListener('mousedown', e => {
        isDragging = true;
        x = e.clientX - el.getBoundingClientRect().left;
        y = e.clientY - el.getBoundingClientRect().top;
        el.style.animation = 'none';
      });
      document.addEventListener('mousemove', e => {
        if (isDragging) {
          el.style.left = `${e.clientX - x}px`;
          el.style.top = `${e.clientY - y}px`;
        }
      });
      document.addEventListener('mouseup', () => isDragging = false);
    }

    // Iniciar
    window.onload = () => {
      createStars();
      createHearts();
      // Algunos monitos al inicio
      setTimeout(addRandomMonito, 800);
      setTimeout(addRandomMonito, 1600);
      setTimeout(addRandomMonito, 2500);
    };
  </script>
</body>
</html>
